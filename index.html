<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Press Start 2P', cursive; text-align: center; }
        .btn { width: 80%; height: 70px; margin: 10px; border-radius: 15px; border: none; font-family: 'Press Start 2P'; color: white; cursor: pointer; }
        .red { background: #ff4757; } .green { background: #2ed573; } .blue { background: #1e90ff; }
        .connect { background: gold; color: black; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h1>BERGIS BLE</h1>
    <button class="btn connect" onclick="connectBT()">VERBINDEN</button>
    <button class="btn" style="background:gray" onclick="send('S')">START</button>
    <hr>
    <button class="btn red" onclick="send('R')">RED</button>
    <button class="btn green" onclick="send('G')">GREEN</button>
    <button class="btn blue" onclick="send('B')">BLUE</button>

    <script>
        let charac;
        async function connectBT() {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Bergis-Game-BLE' }],
                optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            charac = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            alert("Verbunden!");
        }

        function send(cmd) {
            if (charac) {
                charac.writeValue(new TextEncoder().encode(cmd));
            }
        }
    </script>
</body>
</html>
