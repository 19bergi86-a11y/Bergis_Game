<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bergis Game BLE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Press Start 2P', cursive; 
            text-align: center; 
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }
        h1 { color: #ff00ff; text-shadow: 3px 3px #550055; font-size: 16px; margin-bottom: 20px; }
        
        #stats { margin: 15px auto; color: gold; font-size: 10px; border: 2px solid gold; padding: 10px; border-radius: 10px; width: fit-content; }
        
        .btn { 
            border: none; 
            font-family: 'Press Start 2P'; 
            cursor: pointer; 
            transition: all 0.05s;
            color: white;
            position: relative;
        }

        /* Status Buttons */
        .connect { width: 90%; height: 50px; border-radius: 10px; background: gold; color: black; font-size: 12px; margin-bottom: 10px; box-shadow: 0 5px #b8860b; }
        .disconnect { width: 90%; height: 50px; border-radius: 10px; background: #ff4757; display: none; font-size: 12px; box-shadow: 0 5px #a32d37; }
        .start { width: 90%; height: 60px; background: #444; border-radius: 10px; font-size: 16px; margin: 20px 0; box-shadow: 0 6px #222; }

        .connect:active, .disconnect:active, .start:active { transform: translateY(3px); box-shadow: 0 2px #222; }

        /* Mechanische Spiel-Buttons */
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .circle-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(0,0,0,0.3);
        }

        .red { 
            background: radial-gradient(circle at 30% 30%, #ff6b81, #ff4757); 
            box-shadow: 0 8px 0 #a32d37, 0 12px 15px rgba(0,0,0,0.5);
        }
        .green { 
            background: radial-gradient(circle at 30% 30%, #7bed9f, #2ed573); 
            box-shadow: 0 8px 0 #1e8c4b, 0 12px 15px rgba(0,0,0,0.5);
        }
        .blue { 
            background: radial-gradient(circle at 30% 30%, #70a1ff, #1e90ff); 
            box-shadow: 0 8px 0 #145da0, 0 12px 15px rgba(0,0,0,0.5);
        }

        .circle-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #222, 0 4px 8px rgba(0,0,0,0.6);
        }

        hr { border: 0; border-top: 2px solid #333; margin: 30px 0; }
    </style>
</head>
<body>

    <h1>BERGIS BLE</h1>

    <button id="btnConnect" class="btn connect" onclick="connectBT()">VERBINDEN</button>
    <button id="btnDisconnect" class="btn disconnect" onclick="disconnectBT()">TRENNEN</button>

    <div id="stats">HIGHSCORE: <span id="hs">---</span></div>

    <button class="btn start" onclick="startGame()">START</button>

    <hr>

    <div class="game-controls">
        <button class="btn circle-btn red" onclick="send('R')">R</button>
        <button class="btn circle-btn green" onclick="send('G')">G</button>
        <button class="btn circle-btn blue" onclick="send('B')">B</button>
    </div>

    <script>
        let device, server, charac;
        const startSound = new Audio('https://freesound.org');
        const loseSound = new Audio('https://freesound.org');

        async function connectBT() {
            startSound.play().then(() => { startSound.pause(); startSound.currentTime = 0; });
            loseSound.play().then(() => { loseSound.pause(); loseSound.currentTime = 0; });

            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Bergis-Game-BLE' }],
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                
                device.addEventListener('gattserverdisconnected', onDisconnected);
                server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                charac = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                
                await charac.startNotifications();
                charac.addEventListener('characteristicvaluechanged', (event) => {
                    let val = new TextDecoder().decode(event.target.value);
                    if (val === "L") { loseSound.play(); alert("GAME OVER!"); }
                    else { document.getElementById('hs').innerText = val; }
                });

                const initialVal = await charac.readValue();
                document.getElementById('hs').innerText = new TextDecoder().decode(initialVal);

                document.getElementById('btnConnect').style.display = 'none';
                document.getElementById('btnDisconnect').style.display = 'inline-block';
            } catch (error) { console.log(error); }
        }

        function disconnectBT() { if (device && device.gatt.connected) device.gatt.disconnect(); }

        function onDisconnected() {
            document.getElementById('btnConnect').style.display = 'inline-block';
            document.getElementById('btnDisconnect').style.display = 'none';
        }

        function startGame() { if (charac) { startSound.play(); send('S'); } else { alert("Erst Verbinden!"); } }

        function send(cmd) { if (charac) charac.writeValue(new TextEncoder().encode(cmd)); }
    </script>
</body>
</html>
